<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD 管理器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #667eea;
      --purple: #764ba2;
      --bg: #f0f5ff;
      --white: #fff;
      --text: #2d3748;
      --text-light: #4a5568;
      --border: #e2e8f0;
      --radius: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 工具栏 ── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 14px; z-index: 100;
    }
    .toolbar-logo {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .toolbar-select {
      height: 34px; padding: 0 12px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 13px; background: var(--white);
      color: var(--text); min-width: 200px; cursor: pointer; outline: none;
    }
    .toolbar-select:focus { border-color: var(--primary); }
    .toolbar-btn {
      height: 34px; padding: 0 14px; border: none; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .btn-pri {
      background: linear-gradient(135deg, var(--primary), var(--purple)); color: var(--white);
    }
    .btn-pri:hover { box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4); }
    .btn-sec { background: var(--white); color: var(--text-light); border: 1px solid var(--border); }
    .btn-sec:hover { background: #f7fafc; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .ver-badge {
      font-size: 12px; background: linear-gradient(135deg, var(--primary), var(--purple));
      color: var(--white); padding: 3px 10px; border-radius: 12px;
    }
    .unsaved-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #f59e0b;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.5 } }

    /* ── 主布局 ── */
    .main { padding-top: 52px; display: flex; height: 100vh; overflow: hidden; }

    /* ── 左侧列表 ── */
    .list-panel {
      width: 280px; flex-shrink: 0; background: var(--white);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
    }
    .list-header {
      padding: 16px 20px 12px; font-size: 14px; font-weight: 600; color: var(--text-light);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .list-items { flex: 1; overflow-y: auto; padding: 8px; }
    .list-item {
      padding: 10px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px;
      color: var(--text-light); transition: all 0.15s; display: flex; align-items: center; justify-content: space-between;
    }
    .list-item:hover { background: #f7fafc; }
    .list-item.active { background: rgba(102, 126, 234, 0.1); color: var(--primary); font-weight: 500; }
    .list-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-item-badge { font-size: 11px; background: rgba(102, 126, 234, 0.15); color: var(--primary); padding: 1px 6px; border-radius: 8px; }
    .list-empty { padding: 40px 20px; text-align: center; color: #a0aec0; font-size: 13px; }
    .add-route-btn {
      margin: 8px; padding: 8px; border: 1px dashed var(--border); border-radius: var(--radius);
      background: none; color: #a0aec0; font-size: 13px; cursor: pointer; width: calc(100% - 16px); transition: all 0.15s;
    }
    .add-route-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ── 右侧内容 ── */
    .content-panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .content-scroll { flex: 1; overflow-y: auto; padding: 32px 40px; }
    .content-inner {
      max-width: 860px; margin: 0 auto; background: var(--white);
      border-radius: var(--radius); box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden;
    }

    /* ── PRD 内容样式（对齐 PrdPanel.tsx） ── */
    .prd-content { padding: 32px 36px; }
    .prd-hwrap { margin-bottom: 4px; }

    /* h1 */
    .prd-h1-title { font-size: 24px; font-weight: 700; color: #1a1a2e; padding: 12px 0 10px; letter-spacing: 1px; margin: 0; }
    .prd-h1-line { height: 3px; background: linear-gradient(90deg, var(--primary), var(--purple)); margin-bottom: 20px; border-radius: 2px; }
    /* h2 */
    .prd-h2-title { font-size: 20px; font-weight: 700; color: #2d3748; padding: 14px 0 8px; margin: 0; }
    .prd-h2-line { height: 2px; background: var(--primary); margin-bottom: 16px; }
    /* h3 */
    .prd-h3-title { font-size: 17px; font-weight: 600; color: #3d4a5c; padding: 12px 0 6px; margin: 0; }
    .prd-h3-line { height: 1px; background: var(--primary); margin-bottom: 12px; opacity: 0.6; }
    /* h4 */
    .prd-h4-title { font-size: 15px; font-weight: 600; color: #4a5568; padding: 10px 0 6px; margin: 0; }
    .prd-h4-line { height: 1px; background: #a0aec0; margin-bottom: 10px; }
    /* h5 */
    .prd-h5-title { font-size: 14px; font-weight: 600; color: #5a6578; padding: 8px 0 4px; margin: 0; }
    .prd-h5-line { height: 1px; background: #cbd5e0; margin-bottom: 8px; }
    /* h6 */
    .prd-h6-title { font-size: 13px; font-weight: 600; color: #6b7280; padding: 6px 0 4px; margin: 0; }
    .prd-h6-line { height: 1px; background: #e2e8f0; margin-bottom: 6px; }

    /* 折叠标题 */
    .collapsible-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .collapsible-header:hover { background: rgba(102,126,234,0.08); border-radius: 4px; }
    .collapse-icon { font-size: 10px; color: var(--primary); transition: transform 0.15s; background: transparent; border-radius: 3px; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 8px; }
    .collapsible-header:hover .collapse-icon { background: var(--primary); color: #fff; }

    /* 内容块 */
    .prd-p { color: var(--text-light); line-height: 1.8; margin: 0 0 14px; }
    .prd-ul, .prd-ol { color: var(--text-light); margin: 0 0 14px; padding-left: 24px; }
    .prd-li { margin: 6px 0; line-height: 1.7; }
    .prd-block { cursor: text; border-radius: 4px; transition: background 0.15s; margin-bottom: 4px; }
    .prd-block:hover { background: rgba(102, 126, 234, 0.05); }
    .title-text { flex: 1; display: flex; align-items: center; }

    .prd-twrap { overflow-x: auto; margin: 16px 0; border-radius: var(--radius); border: 1px solid var(--border); }
    .prd-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .prd-tbl th, .prd-tbl td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    .prd-tbl th { background: linear-gradient(135deg, #f5f7fa, #edf2f7); font-weight: 600; color: var(--text); }
    .prd-tbl tr:last-child td { border-bottom: none; }
    .prd-tbl tr:nth-child(even) { background: #fafbfc; }

    .prd-code { background: #edf2f7; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: var(--primary); font-family: 'Monaco', 'Menlo', monospace; }
    .prd-pre { background: #1a1a2e; padding: 16px; border-radius: var(--radius); overflow-x: auto; margin: 16px 0; }

    .prd-hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .prd-mermaid svg { max-width: 100%; height: auto; }

    .modal textarea { width: 100%; min-height: 200px; max-height: 60vh; padding: 14px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Monaco', 'Menlo', monospace; font-size: 14px; line-height: 1.6; resize: vertical; outline: none; box-sizing: border-box; }

// ── Markdown 解析 ─────────────────────────────────────────
function parseTree(lines, startIdx, parentLevel) {
  const nodes = [];
  let i = startIdx;
  while (i < lines.length) {
    const line = lines[i];
    const hMatch = line.match(/^(#{1,10})\s+(.+)$/);
    if (hMatch) {
      const level = hMatch[1].length;
      if (level <= parentLevel && parentLevel > 0) break;
      const { nodes: children, endIdx } = parseTree(lines, i + 1, level);
      const rawLines = [];
      for (let k = i + 1; k < endIdx; k++) rawLines.push(lines[k]);
      nodes.push({ type: 'heading', level, text: hMatch[2], lineIdx: i, children, raw: rawLines.join('\n') });
      i = endIdx;
    } else if (line.trim()) {
      let blockLines = [line];
      let j = i + 1;
      while (j < lines.length) {
        const nl = lines[j];
        if (nl.match(/^(#{1,10})\s/)) break;
        if (nl.trim()) blockLines.push(nl);
        j++;
      }
      nodes.push({ type: 'content', raw: blockLines.join('\n'), lineIdx: i, children: [] });
      i = j;
    } else {
      i++;
    }
  }
  return { nodes, endIdx: i };
}

function renderTables(text) {
  // 逐行解析表格，支持缩进表格和多列表格
  const lines = text.split('\n');
  const result = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();
    if (line.startsWith('|') && line.endsWith('|') && line.includes('|', 1)) {
      if (i + 1 < lines.length) {
        const next = lines[i + 1].trim();
        const sepContent = next.replace(/^\||\|$/g, '').trim();
        const isSep = sepContent !== '' && /^[:\-\s|]+$/.test(sepContent);
        if (isSep) {
          const headerLine = line;
          const dataLines = [];
          let j = i + 2;
          while (j < lines.length) {
            const dl = lines[j].trim();
            if (dl.startsWith('|') && dl.endsWith('|') && dl.includes('|', 1)) {
              const content = dl.replace(/^\||\|$/g, '').trim();
              const nextOfDl = j + 1 < lines.length ? lines[j + 1].trim() : '';
              const nextSepContent = nextOfDl.replace(/^\||\|$/g, '').trim();
              const isNextSep = nextSepContent !== '' && /^[:\-\s|]+$/.test(nextSepContent);
              const isSepItself = content !== '' && /^[:\-\s|]+$/.test(content);
              if (isNextSep || isSepItself) break;
              dataLines.push(dl);
              j++;
            } else {
              break;
            }
          }
          const ths = headerLine.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
          const rows = dataLines.map(row =>
            '<tr>' + row.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1).map(c => `<td>${c.trim()}</td>`).join('') + '</tr>'
          ).join('');
          result.push(`<div class="prd-twrap"><table class="prd-tbl"><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`);
          i = j;
          continue;
        }
      }
    }
    result.push(lines[i]);
    i++;
  }
  return result.join('\n');
}

function renderLists(text) {
  text = text.replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)\n(?=<li>)/g, '$1');
  text = text.replace(/(<li>.*<\/li>)/gs, m => (m.includes('<ul>') || m.includes('<ol>') ? m : `<ul class="prd-ul">${m}</ul>`));
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>.*<\/li>)\n(?=<li>)/g, '$1');
  text = text.replace(/(<li>.*<\/li>)/gs, m => (m.includes('<ol>') || m.includes('<ul>') ? m : `<ol class="prd-ol">${m}</ol>`));
  return text;
}

function mdBlock(raw) {
  let html = raw;
  html = html.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) =>
    `<div class="prd-mermaid" data-code="${encodeURIComponent(code.trim())}"></div>`);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, _l, code) =>
    `<pre class="prd-pre"><code>${escHtml(code.trim())}</code></pre>`);
  html = renderTables(html);
  html = html.replace(/^---$/gm, '<hr class="prd-hr">');
  html = renderLists(html);
  html = html.replace(/`([^`]+)`/g, '<code class="prd-code">$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[ \]/g, '<input type="checkbox" class="prd-cb">');
  html = html.replace(/\[x\]/gi, '<input type="checkbox" class="prd-cb" checked>');
  html = html.replace(/\n/g, '<br>');
  // 不把块级 HTML（表格、代码块等）包进 <p>
  const lines = html.split('\n');
  let result = '';
  let buffer = '';
  const flush = () => { if (buffer) { result += `<p class="prd-p">${buffer}</p>`; buffer = ''; } };
  for (const line of lines) {
    if (/^</.test(line.trim())) { flush(); result += line + '\n'; }
    else { buffer += (buffer ? '<br>' : '') + line; }
  }
  flush();
  return result;
}

function renderNodes(nodes) {
  let html = '';
  nodes.forEach(node => {
    if (node.type === 'heading') {
      const lvl = node.level;
      const lc = `prd-h${lvl}`;
      if (lvl === 1) {
        const inner = node.children && node.children.length ? renderNodes(node.children) : '';
        html += `<div class="prd-hwrap ${lc}-wrapper">
  <div class="${lc}-header title-text"><h1 class="${lc}-title">${node.text}</h1></div>
  <div class="${lc}-line"></div>
  ${inner ? `<div class="${lc}-content">${inner}</div>` : ''}
</div>`;
      } else {
        const inner = node.children && node.children.length ? renderNodes(node.children) : '';
        html += `<div class="prd-hwrap ${lc}-wrapper">
  <div class="${lc}-header collapsible-header" data-section-start="${node.lineIdx}" onclick="toggleSection(this)">
    <div class="title-text"><${'h'+lvl} class="${lc}-title">${node.text}</${'h'+lvl}></div>
    <span class="collapse-icon">▼</span>
  </div>
  <div class="${lc}-line"></div>
  <div class="${lc}-content">${inner}</div>
</div>`;
      }
    } else if (node.type === 'content' && node.raw) {
      html += `<div class="prd-block" data-line="${node.lineIdx}" ondblclick="openParagraphEdit(${node.lineIdx})">${mdBlock(node.raw)}</div>`;
    }
  });
  return html;
}

function toggleSection(el) {
  const wrap = el.closest('.prd-hwrap');
  if (!wrap) return;
  // 从 wrapper 的 class 找 level：prd-h2-wrapper → prd-h2
  const levelCls = Array.from(wrap.classList).find(c => /^prd-h\d-wrapper$/.test(c))?.replace('-wrapper', '');
  const content = levelCls ? wrap.querySelector('.' + levelCls + '-content') : null;
  const isCollapsed = el.classList.contains('collapsed');
  if (isCollapsed) {
    el.classList.remove('collapsed');
    el.querySelector('.collapse-icon').textContent = '▼';
    if (content) content.style.display = '';
  } else {
    el.classList.add('collapsed');
    el.querySelector('.collapse-icon').textContent = '▶';
    if (content) content.style.display = 'none';
  }
}

// ── 渲染 ──────────────────────────────────────────────────
function render() {
  if (!currentRoute) {
    $('contentArea').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div>从左侧选择一个页面开始</div></div>`;
    $('verBadge').textContent = '';
    $('unsavedDot').style.display = 'none';
    return;
  }
  if (isEditing) {
    $('contentArea').innerHTML = `<textarea class="editor-textarea" id="fullEditor">${escHtml(currentContent)}</textarea>`;
    $('fullEditor').focus();
  } else {
    const lines = currentContent.split('\n');
    const { nodes } = parseTree(lines, 0, 0);
    $('contentArea').innerHTML = `<div class="prd-content">${renderNodes(nodes)}</div>`;
    renderMermaidInDoc();
  }
  updateVerBadge();
}

function updateVerBadge() {
  const vm = currentContent.match(/### v(\d+)/);
  const dm = currentContent.match(/### v\d+\s+-\s+(\d{4}[-/]\d{2}[-/]\d{2})/);
  let badge = vm ? `v${vm[1]}` : 'v1';
  if (dm) badge += ` · ${dm[1]}`;
  $('verBadge').textContent = badge;
  $('unsavedDot').style.display = currentContent !== originalContent ? '' : 'none';
}

// ── Mermaid ────────────────────────────────────────────────
function renderMermaidInDoc() {
  const els = document.querySelectorAll('.prd-mermaid[data-code]');
  if (!els.length) return;
  if (!window.__mermaid_loaded__) {
    window.__mermaid_loaded__ = true;
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js';
    s.onload = () => { window.mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' }); setTimeout(doMermaid, 50); };
    s.onerror = () => els.forEach(el => { el.outerHTML = `<div class="prd-merr">图表加载失败</div>`; });
    document.head.appendChild(s);
  } else {
    setTimeout(doMermaid, 50);
  }
  function doMermaid() {
    document.querySelectorAll('.prd-mermaid[data-code]').forEach(el => {
      const code = decodeURIComponent(el.dataset.code || '');
      if (!code) return;
      const id = 'm-' + Math.random().toString(36).substr(2, 9);
      el.removeAttribute('data-code');
      window.mermaid.render(id, code).then(({ svg }) => { el.innerHTML = svg; }).catch(err => {
        el.outerHTML = `<div class="prd-merr">图表渲染失败: ${err.message || err}</div>`;
      });
    });
  }
}

// ── 段落编辑 ───────────────────────────────────────────────
function openParagraphEdit(lineIdx) {
  if (isEditing) return;
  const lines = currentContent.split('\n');
  let endIdx = lineIdx + 1;
  while (endIdx < lines.length && !lines[endIdx].match(/^#{1,10}\s/)) endIdx++;
  editingLineIdx = lineIdx;
  $('paragraphTextarea').value = lines.slice(lineIdx, endIdx).join('\n');
  $('paragraphModal').style.display = 'flex';
  $('paragraphTextarea').focus();
}

function closeParagraphEdit() {
  $('paragraphModal').style.display = 'none';
  editingLineIdx = null;
}

async function saveParagraphEdit() {
  if (editingLineIdx === null) return;
  const newText = $('paragraphTextarea').value;
  const lines = currentContent.split('\n');
  let endIdx = editingLineIdx + 1;
  while (endIdx < lines.length && !lines[endIdx].match(/^#{1,10}\s/)) endIdx++;
  const newContent = [...lines.slice(0, editingLineIdx), newText, ...lines.slice(endIdx)].join('\n');
  currentContent = newContent;
  originalContent = newContent;
  closeParagraphEdit();
  render();
  try {
    await apiFetch('/api/prd/save', { method: 'POST', body: JSON.stringify({ route: currentRoute, content: newContent }) });
    toast('保存成功', 'suc');
  } catch { toast('保存失败，请先启动 PRD 服务', 'err'); }
}

// ── 全量编辑 ───────────────────────────────────────────────
function enterEditMode() {
  isEditing = true;
  $('contentArea').innerHTML = `<textarea class="editor-textarea" id="fullEditor">${escHtml(currentContent)}</textarea>`;
  $('fullEditor').focus();
}

async function saveFullEdit() {
  const newContent = $('fullEditor').value;
  currentContent = newContent;
  originalContent = newContent;
  isEditing = false;
  render();
  try {
    await apiFetch('/api/prd/save', { method: 'POST', body: JSON.stringify({ route: currentRoute, content: newContent }) });
    toast('保存成功', 'suc');
  } catch { toast('保存失败，请先启动 PRD 服务', 'err'); }
}

// ── 加载/路由列表 ──────────────────────────────────────────
async function loadRouteList() {
  try { return (await apiFetch('/api/prd/list')).routes || []; }
  catch { return []; }
}

async function refreshRouteList(routes) {
  const el = $('listItems');
  const sel = $('routeSelect');
  if (!routes.length) {
    el.innerHTML = '<div class="list-empty">暂无文档<br><small style="color:#cbd5e0">点击右上角"新建"创建第一个 PRD</small></div>';
    sel.innerHTML = '<option value="">— 选择页面 —</option>';
    return;
  }
  el.innerHTML = routes.map(r => `
    <div class="list-item ${r === currentRoute ? 'active' : ''}" data-route="${r}" onclick="selectRoute('${r}')">
      <span class="list-item-name">${r}</span>
      <span class="list-item-badge">.md</span>
    </div>`).join('');
  sel.innerHTML = '<option value="">— 选择页面 —</option>' + routes.map(r => `<option value="${r}" ${r === currentRoute ? 'selected' : ''}>${r}</option>`).join('');
}

async function selectRoute(route) {
  currentRoute = route;
  try {
    const d = await apiFetch('/api/prd/read?route=' + encodeURIComponent(route));
    currentContent = d.content || defaultTemplate(route);
  } catch { currentContent = defaultTemplate(route); }
  originalContent = currentContent;
  isEditing = false;
  render();
  const routes = await loadRouteList();
  await refreshRouteList(routes);
}

async function createNewRoute() {
  const name = prompt('输入页面名称（英文，用于路由标识）：');
  if (!name || !name.trim()) return;
  const route = name.trim().toLowerCase().replace(/\s+/g, '-');
  const tpl = defaultTemplate(route);
  try {
    await apiFetch('/api/prd/save', { method: 'POST', body: JSON.stringify({ route, content: tpl }) });
    toast(`已创建: ${route}`, 'suc');
    await selectRoute(route);
  } catch { toast('创建失败，请先启动 PRD 服务', 'err'); }
}

// ── 事件绑定 ───────────────────────────────────────────────
$('newBtn').onclick = createNewRoute;
$('addRouteBtn').onclick = createNewRoute;
$('routeSelect').onchange = e => { if (e.target.value) selectRoute(e.target.value); };
$('editBtn').onclick = () => { if (currentRoute) { if (isEditing) { /* already editing */ } else enterEditMode(); } };
$('saveBtn').onclick = () => { if (currentRoute) { if (isEditing) saveFullEdit(); else toast('请先点击"编辑"进入编辑模式', 'info'); } };
$('modalCancel').onclick = closeParagraphEdit;
$('modalSave').onclick = saveParagraphEdit;
$('paragraphModal').onclick = e => { if (e.target === $('paragraphModal')) closeParagraphEdit(); };
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeParagraphEdit();
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (isEditing) saveFullEdit(); }
});

// ── 初始化 ───────────────────────────────────────────────
(async () => {
  const routes = await loadRouteList();
  await refreshRouteList(routes);
})();
</script>
</body>
</html>
